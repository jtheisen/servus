name: NuGet Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Servus.sln

      - name: Compute package version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content Servus/Servus.csproj
          $baseVersion = $project.Project.PropertyGroup.PackageVersion
          $packageVersion = "$baseVersion.${{ github.run_number }}"
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet build Servus.sln --configuration Debug --no-restore -p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Pack
        run: dotnet pack Servus/Servus.csproj --configuration Debug --no-build --output artifacts -p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Publish to NuGet
        shell: pwsh
        run: |
          $packages = Get-ChildItem artifacts -Filter *.nupkg
          if ($packages.Count -eq 0) {
            throw "No NuGet packages found in artifacts."
          }

          $packages | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          }
